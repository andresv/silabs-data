block/Syscfg:
  description: SYSCFG peripheral.
  items:
  - name: ipversion
    description: No Description.
    byte_offset: 4
    access: Read
    fieldset: regs::Ipversion
  - name: if_
    description: Read to get system status.
    byte_offset: 8
    fieldset: regs::If
  - name: ien
    description: Write to enable interrupts.
    byte_offset: 12
    fieldset: regs::Ien
  - name: chiprevhw
    description: Read to get the hard-wired chip revision.
    byte_offset: 20
    fieldset: regs::Chiprevhw
  - name: chiprev
    description: Read to get the chip revision programmed by feature configuration.
    byte_offset: 24
    fieldset: regs::Chiprev
  - name: cfgsystic
    description: Configure the source of the system tick for the M33.
    byte_offset: 36
    fieldset: regs::Cfgsystic
  - name: ctrl
    description: Configure to provide general RAM configuration.
    byte_offset: 512
    fieldset: regs::Ctrl
  - name: dmem0retnctrl
    description: Configure to provide general RAM retention configuration.
    byte_offset: 520
    fieldset: regs::Dmem0retnctrl
  - name: rambiasconf
    description: Configure RAM bias configure bits.
    byte_offset: 780
    fieldset: regs::Rambiasconf
  - name: radioramretnctrl
    description: Configure SEQRAM Retention controls.
    byte_offset: 1024
    fieldset: regs::Radioramretnctrl
  - name: radioeccctrl
    description: Configure to set RAM ECC control.
    byte_offset: 1032
    fieldset: regs::Radioeccctrl
  - name: seqrameccaddr
    description: Read to get status of the SEQRAM ECC error address.
    byte_offset: 1040
    access: Read
    fieldset: regs::Seqrameccaddr
  - name: frcrameccaddr
    description: Read to get status of the FRCRAM ECC error address.
    byte_offset: 1044
    access: Read
    fieldset: regs::Frcrameccaddr
  - name: icacheramretnctrl
    description: Configure Host ICACHERAM retention configuration.
    byte_offset: 1048
    fieldset: regs::Icacheramretnctrl
  - name: dmem0portmapsel
    description: Configure DMEM0 port remap selection.
    byte_offset: 1052
    fieldset: regs::Dmem0portmapsel
  - name: rootdata0
    description: Generic data space for user to pass to root, e.g., address of struct in mem.
    byte_offset: 1536
    fieldset: regs::Rootdata0
  - name: rootdata1
    description: Generic data space for user to pass to root, e.g., address of struct in mem.
    byte_offset: 1540
    fieldset: regs::Rootdata1
  - name: rootlockstatus
    description: This register returns the status of the SE managed locks.
    byte_offset: 1544
    access: Read
    fieldset: regs::Rootlockstatus
  - name: rootseswversion
    description: SE Software version.
    byte_offset: 1548
    fieldset: regs::Rootseswversion
fieldset/regs::Cfgsystic:
  description: Configure the source of the system tick for the M33.
  fields:
  - name: systicextclken
    description: SysTick External Clock Enable.
    bit_offset: 0
    bit_size: 1
fieldset/regs::Chiprev:
  description: Read to get the chip revision programmed by feature configuration.
  fields:
  - name: major
    description: Chip Revision Major value.
    bit_offset: 0
    bit_size: 6
  - name: family
    description: Chip Family value.
    bit_offset: 6
    bit_size: 6
    enum: vals::Family
  - name: minor
    description: Chip Revision Minor value.
    bit_offset: 12
    bit_size: 8
fieldset/regs::Chiprevhw:
  description: Read to get the hard-wired chip revision.
