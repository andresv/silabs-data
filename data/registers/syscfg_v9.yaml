    description: Configure SEQRAM Retention controls.
    byte_offset: 1024
    fieldset: regs::Radioramretnctrl
  - name: radioeccctrl
    description: Configure to set RAM ECC control.
    byte_offset: 1032
    fieldset: regs::Radioeccctrl
