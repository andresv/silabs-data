enum/vals::Aloc:
  bit_size: 1
  variants:
  - name: Seg0to7
    description: Animation appears on segments 0 to 7.
    value: 0
  - name: Seg8to15
    description: Animation appears on segments 8 to 15.
    value: 1
enum/vals::Alogsel:
  bit_size: 1
  variants:
  - name: And
    description: AREGA and AREGB AND'ed.
    value: 0
  - name: Or
    description: AREGA and AREGB OR'ed.
    value: 1
enum/vals::Aregasc:
  bit_size: 2
  variants:
  - name: Noshift
    description: No Shift operation on Animation Register A.
    value: 0
  - name: Shiftleft
    description: Animation Register A is shifted left.
    value: 1
  - name: Shiftright
    description: Animation Register A is shifted right.
    value: 2
enum/vals::Aregbsc:
  bit_size: 2
  variants:
  - name: Noshift
    description: No Shift operation on Animation Register B.
    value: 0
  - name: Shiftleft
    description: Animation Register B is shifted left.
    value: 1
  - name: Shiftright
    description: Animation Register B is shifted right.
    value: 2
enum/vals::Autoload:
  bit_size: 1
  variants:
  - name: Auto
    description: CLK_BUS register to CLK_PER register loads will be started automatically after a write to the register in UPDATECTRL.LOADADDR is detected.
    value: 1
  - name: Manual
    description: CLK_BUS register to CLK_PER register loads must be done manually with a write to CMD.LOAD.
    value: 0
enum/vals::Bias:
  bit_size: 2
  variants:
  - name: Onefourth
    description: 1/4 Bias.
    value: 3
  - name: Onehalf
    description: 1/2 Bias.
    value: 1
  - name: Onethird
    description: 1/3 Bias.
    value: 2
  - name: Static
    description: Static.
    value: 0
enum/vals::Chgrdst:
  bit_size: 3
  variants:
  - name: Disable
    description: Disable charge redistribution.
    value: 0
  - name: Four
    description: Use 4 prescaled low frequency clock cycles for charge redistribution.
    value: 4
  - name: One
    description: Use 1 prescaled low frequency clock cycle for charge redistribution.
    value: 1
  - name: Three
    description: Use 3 prescaled low frequency clock cycles for charge redistribution.
    value: 3
  - name: Two
    description: Use 2 prescaled low frequency clock cycles for charge redistribution.
    value: 2
enum/vals::Dmamode:
  bit_size: 2
  variants:
  - name: Dmadisable
    description: No DMA requests are generated.
    value: 0
  - name: Dmadisplay
    description: DMA request on display counter event. This will also start a DMA transfer during EM23.
    value: 2
  - name: Dmafc
    description: DMA request on frame counter event. This will also start a DMA transfer during EM23.
    value: 1
enum/vals::Fcpresc:
  bit_size: 2
  variants:
  - name: Div1
    description: every frame clock.
    value: 0
  - name: Div2
    description: every 2nd frame clock.
    value: 1
  - name: Div4
    description: every 4th frame clock.
    value: 2
  - name: Div8
    description: every 8th frame clock.
    value: 3
enum/vals::Loadaddr:
  bit_size: 5
  variants:
  - name: Aregawr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to AREGA. Use with UPDATECTRL.AUTOLOAD.
    value: 1
  - name: Aregbwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to AREGB. Use with UPDATECTRL.AUTOLOAD.
    value: 2
  - name: Bactrlwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to BACTRL. Use with UPDATECTRL.AUTOLOAD.
    value: 0
  - name: Segd0hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD0H. Use with UPDATECTRL.AUTOLOAD.
    value: 11
  - name: Segd0wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD0. Use with UPDATECTRL.AUTOLOAD.
    value: 3
  - name: Segd1hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD1H. Use with UPDATECTRL.AUTOLOAD.
    value: 12
  - name: Segd1wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD1. Use with UPDATECTRL.AUTOLOAD.
    value: 4
  - name: Segd2hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD2H. Use with UPDATECTRL.AUTOLOAD.
    value: 13
  - name: Segd2wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD2. Use with UPDATECTRL.AUTOLOAD.
    value: 5
  - name: Segd3hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD3H. Use with UPDATECTRL.AUTOLOAD.
    value: 14
  - name: Segd3wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD3. Use with UPDATECTRL.AUTOLOAD.
    value: 6
  - name: Segd4hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD4H. Use with UPDATECTRL.AUTOLOAD.
    value: 15
  - name: Segd4wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD4. Use with UPDATECTRL.AUTOLOAD.
    value: 7
  - name: Segd5hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD5H. Use with UPDATECTRL.AUTOLOAD.
    value: 16
  - name: Segd5wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD5. Use with UPDATECTRL.AUTOLOAD.
    value: 8
  - name: Segd6hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD6H. Use with UPDATECTRL.AUTOLOAD.
    value: 17
  - name: Segd6wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD6. Use with UPDATECTRL.AUTOLOAD.
    value: 9
  - name: Segd7hwr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD7H. Use with UPDATECTRL.AUTOLOAD.
    value: 18
  - name: Segd7wr
    description: Starts synchronizing registers from CLK_BUS to CLK_PER after a write to SEGD7. Use with UPDATECTRL.AUTOLOAD.
    value: 10
enum/vals::Mode:
  bit_size: 1
  variants:
  - name: Chargepump
    description: Use the charge pump to pump VLCD above VDDX.
    value: 1
  - name: Stepdown
    description: Use step down control with VLCD less than VDDX. Use VLCD[4:0] to control VLCD level, and use SPEED to adjust VLCD drive strength.
    value: 0
enum/vals::Mux:
  bit_size: 3
  variants:
  - name: Duplex
    description: Duplex.
    value: 1
  - name: Octaplex
    description: Octaplex.
    value: 7
  - name: Quadruplex
    description: Quadruplex.
    value: 3
  - name: Sextaplex
    description: Sextaplex.
    value: 5
  - name: Static
    description: Static.
    value: 0
  - name: Triplex
    description: Triplex.
    value: 2
enum/vals::Udctrl:
  bit_size: 2
  variants:
  - name: Displayevent
    description: The data transfer is done at the next Display Counter event.
    value: 3
  - name: Fcevent
    description: The data transfer is done at the next Frame Counter event.
    value: 2
  - name: Framestart
    description: Data is loaded continuously at every frame start.
    value: 1
  - name: Regular
    description: The data transfer is controlled by SW. Transfer is performed as soon as possible on the next CTRL.PRESCALE clock. This is primarily available for debug only since only some of the new SEGMENT data may be ready by the time of the UPDATE. This should not be used with interrupts since partially updating SEGMENT data may have indeterminant results.
    value: 0
enum/vals::Vddxsel:
  bit_size: 1
  variants:
  - name: Avdd
    description: Connect charge pump to analog AVDD supply.
    value: 1
  - name: Dvdd
    description: Connect charge pump to digital DVDD supply.
    value: 0
enum/vals::Warmupdly:
  bit_size: 3
  variants:
  - name: Warmup1
    description: 1mswarm up.
    value: 0
  - name: Warmup1000
    description: 1000ms warm up.
    value: 6
  - name: Warmup125
    description: 125ms warm up.
    value: 3
  - name: Warmup2000
    description: 2000ms warm up.
    value: 7
  - name: Warmup250
    description: 250ms warm up.
    value: 4
  - name: Warmup31
    description: 31ms warm up.
    value: 1
  - name: Warmup500
    description: 500ms warm up.
    value: 5
  - name: Warmup63
    description: 62ms warm up.
    value: 2
enum/vals::Wave:
  bit_size: 1
  variants:
  - name: Typea
    description: Type A waveform.
    value: 1
  - name: Typeb
    description: Type B waveform.
    value: 0
