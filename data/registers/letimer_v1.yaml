  - name: UFOA1
    description: Underflow Output Action 1.
    bit_offset: 4
    bit_size: 2
    enum: vals::UFOA1
  - name: OPOL0
    description: Output 0 Polarity.
    bit_offset: 6
    bit_size: 1
  - name: OPOL1
    description: Output 1 Polarity.
    bit_offset: 7
    bit_size: 1
  - name: BUFTOP
    description: Buffered Top.
    bit_offset: 8
    bit_size: 1
  - name: CNTTOPEN
    description: Compare Value 0 Is Top Value.
    bit_offset: 9
    bit_size: 1
  - name: DEBUGRUN
    description: Debug Mode Run Enable.
    bit_offset: 12
    bit_size: 1
  - name: CNTPRESC
    description: Counter prescaler value.
    bit_offset: 16
    bit_size: 4
