    bit_size: 2
    enum: vals::PRSSTARTMODE
  - name: PRSSTOPMODE
    description: PRS Stop Mode.
    bit_offset: 22
    bit_size: 2
    enum: vals::PRSSTOPMODE
  - name: PRSCLEARMODE
    description: PRS Clear Mode.
    bit_offset: 26
    bit_size: 2
    enum: vals::PRSCLEARMODE
