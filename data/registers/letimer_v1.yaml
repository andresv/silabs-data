  description: No Description.
  fields:
  - name: COMP0
    description: Compare Value 0.
    bit_offset: 0
    bit_size: 24
fieldset/regs::COMP1:
  description: No Description.
  fields:
  - name: COMP1
    description: Compare Value 1.
    bit_offset: 0
    bit_size: 24
