    description: Start LETIMER.
    bit_offset: 0
    bit_size: 1
  - name: STOP
    description: Stop LETIMER.
    bit_offset: 1
    bit_size: 1
  - name: CLEAR
    description: Clear LETIMER.
    bit_offset: 2
    bit_size: 1
  - name: CTO0
    description: Clear Toggle Output 0.
    bit_offset: 3
    bit_size: 1
  - name: CTO1
    description: Clear Toggle Output 1.
    bit_offset: 4
    bit_size: 1
