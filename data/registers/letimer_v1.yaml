fieldset/regs::REP1:
  description: No Description.
  fields:
  - name: REP1
    description: Repeat Counter 1.
    bit_offset: 0
    bit_size: 8
fieldset/regs::STATUS:
  description: No Description.
  fields:
  - name: RUNNING
    description: LETIMER Running.
    bit_offset: 0
    bit_size: 1
