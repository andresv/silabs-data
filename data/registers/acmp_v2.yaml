    description: Internal capacitive sense resistor value 0.
    value: 0
  - name: Res1
    description: Internal capacitive sense resistor value 1.
    value: 1
  - name: Res2
    description: Internal capacitive sense resistor value 2.
    value: 2
  - name: Res3
