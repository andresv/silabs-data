block/Acmp:
  description: ACMP peripheral.
  items:
  - name: ipversion
    description: No Description.
    byte_offset: 0
    access: Read
    fieldset: regs::Ipversion
  - name: en
    description: No Description.
    byte_offset: 4
    fieldset: regs::En
  - name: swrst
    description: No Description.
    byte_offset: 8
    fieldset: regs::Swrst
  - name: cfg
    description: No Description.
    byte_offset: 12
    fieldset: regs::Cfg
  - name: ctrl
    description: No Description.
    byte_offset: 16
    fieldset: regs::Ctrl
  - name: inputctrl
    description: No Description.
    byte_offset: 20
    fieldset: regs::Inputctrl
  - name: status
    description: No Description.
    byte_offset: 24
    access: Read
    fieldset: regs::Status
  - name: if_
    description: No Description.
    byte_offset: 28
    fieldset: regs::If
  - name: ien
    description: No Description.
    byte_offset: 32
    fieldset: regs::Ien
  - name: syncbusy
    description: No Description.
    byte_offset: 36
    access: Read
    fieldset: regs::Syncbusy
fieldset/regs::Cfg:
  description: No Description.
  fields:
  - name: bias
    description: Bias Configuration.
    bit_offset: 0
    bit_size: 3
  - name: hyst
    description: Hysteresis mode.
    bit_offset: 8
    bit_size: 4
    enum: vals::Hyst
  - name: inputrange
    description: Input Range.
    bit_offset: 16
    bit_size: 1
    enum: vals::Inputrange
  - name: accuracy
    description: ACMP accuracy mode.
    bit_offset: 17
    bit_size: 1
    enum: vals::Accuracy
fieldset/regs::Ctrl:
  description: No Description.
  fields:
  - name: notrdyval
    description: Not Ready Value.
    bit_offset: 0
    bit_size: 1
    enum: vals::Notrdyval
  - name: gpioinv
    description: Comparator GPIO Output Invert.
    bit_offset: 1
    bit_size: 1
fieldset/regs::En:
  description: No Description.
  fields:
  - name: en
    description: Module enable.
    bit_offset: 0
    bit_size: 1
  - name: disabling
    description: Disablement busy status.
    bit_offset: 1
    bit_size: 1
fieldset/regs::Ien:
  description: No Description.
  fields:
  - name: rise
    description: Rising edge interrupt enable.
    bit_offset: 0
    bit_size: 1
  - name: fall
    description: Falling edge interrupt enable.
    bit_offset: 1
    bit_size: 1
  - name: acmprdy
    description: ACMP ready interrupt enable.
    bit_offset: 2
    bit_size: 1
  - name: inputconflict
    description: Input conflict interrupt enable.
    bit_offset: 3
    bit_size: 1
  - name: portallocerr
    description: Port allocation error interrupt enable.
    bit_offset: 4
    bit_size: 1
fieldset/regs::If:
  description: No Description.
  fields:
  - name: rise
    description: Rising Edge Triggered Interrupt Flag.
    bit_offset: 0
    bit_size: 1
  - name: fall
    description: Falling Edge Triggered Interrupt Flag.
    bit_offset: 1
    bit_size: 1
  - name: acmprdy
    description: ACMP ready Interrupt flag.
    bit_offset: 2
    bit_size: 1
  - name: inputconflict
    description: Input conflict.
    bit_offset: 3
    bit_size: 1
  - name: portallocerr
    description: Port allocation error.
    bit_offset: 4
    bit_size: 1
fieldset/regs::Inputctrl:
  description: No Description.
  fields:
  - name: possel
    description: Positive Input Select.
    bit_offset: 0
    bit_size: 8
    enum: vals::Possel
  - name: negsel
    description: Negative Input Select.
    bit_offset: 8
    bit_size: 8
    enum: vals::Negsel
  - name: vrefdiv
    description: VREF division.
    bit_offset: 16
    bit_size: 6
  - name: csressel
    description: Capacitive Sense Mode Internal Resistor.
    bit_offset: 28
    bit_size: 3
    enum: vals::Csressel
fieldset/regs::Ipversion:
  description: No Description.
  fields:
  - name: ipversion
    description: IP version ID.
    bit_offset: 0
    bit_size: 32
fieldset/regs::Status:
  description: No Description.
  fields:
  - name: acmpout
    description: Analog Comparator Output.
    bit_offset: 0
    bit_size: 1
  - name: acmprdy
    description: Analog Comparator Ready.
    bit_offset: 2
    bit_size: 1
  - name: inputconflict
    description: INPUT conflict.
    bit_offset: 3
    bit_size: 1
  - name: portallocerr
    description: Port allocation error.
    bit_offset: 4
    bit_size: 1
fieldset/regs::Swrst:
  description: No Description.
  fields:
  - name: swrst
    description: Software reset.
    bit_offset: 0
    bit_size: 1
  - name: resetting
    description: Software reset busy status.
    bit_offset: 1
    bit_size: 1
fieldset/regs::Syncbusy:
  description: No Description.
  fields:
  - name: inputctrl
    description: Syncbusy for INPUTCTRL.
    bit_offset: 0
    bit_size: 1
enum/vals::Accuracy:
  bit_size: 1
  variants:
  - name: High
    description: ACMP operates in high-accuracy mode but consumes more current.
    value: 1
  - name: Low
    description: ACMP operates in low-accuracy mode but consumes less current.
    value: 0
enum/vals::Csressel:
  bit_size: 3
  variants:
